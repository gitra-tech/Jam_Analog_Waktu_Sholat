<!DOCTYPE html>
<html>
<head>
  <title>Jam Analog & Digital</title>
  <style>
    body {
      text-align: center;
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(135deg, #74ebd5, #ACB6E5);
      color: #333;
    }
    canvas {
      display: block;
      margin: 30px auto;
      border: 10px solid #000000;
      border-radius: 50%;
      box-shadow: 0 0 25px rgba(0,0,0,0.3);
    }
    #digital {
      font-size: 30px;
      font-weight: bold;
      margin-top: 12px;
    }
    #date {
      font-size: 20px;
      margin-top: 5px;
    }
    #prayer-times {
      font-size: 18px;
      margin-top: 10px;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <canvas id="clock" width="400" height="400"></canvas>
  <div id="digital"></div>
  <div id="date"></div>
  <div id="prayer-times"></div>

  <script>
    const canvas = document.getElementById("clock");
    const ctx = canvas.getContext("2d");
    const digital = document.getElementById("digital");
    const dateDiv = document.getElementById("date");

    function drawClock(){
      const now = new Date();
      const ms = now.getMilliseconds();
      const sec = now.getSeconds() + ms/1000;
      const min = now.getMinutes() + sec/60;
      const hr = now.getHours() + min/60;

      ctx.clearRect(0,0,400,400);

      // background
      let grad = ctx.createRadialGradient(200,200,50,200,200,200);
      grad.addColorStop(0,"#ffffff");
      grad.addColorStop(1,"#e0e0e0");
      ctx.fillStyle = grad;
      ctx.fillRect(0,0,400,400);

      // lingkaran luar
      ctx.beginPath();
      ctx.arc(200,200,180,0,2*Math.PI);
      ctx.strokeStyle = "black";
      ctx.lineWidth = 3;
      ctx.stroke();

      // garis menit/jam
      for(let i=0; i<60; i++){
        let ang = i * Math.PI/30;
        let inner = (i % 5 === 0) ? 165 : 170;
        let outer = 180;
        let x1 = 200 + Math.cos(ang - Math.PI/2) * inner;
        let y1 = 200 + Math.sin(ang - Math.PI/2) * inner;
        let x2 = 200 + Math.cos(ang - Math.PI/2) * outer;
        let y2 = 200 + Math.sin(ang - Math.PI/2) * outer;
        ctx.beginPath();
        ctx.moveTo(x1,y1);
        ctx.lineTo(x2,y2);
        ctx.lineWidth = (i % 5 === 0) ? 2 : 1;
        ctx.strokeStyle = "black";
        ctx.stroke();
      }

      // angka jam
      ctx.font = "bold 30px Arial";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillStyle = "black";
      ctx.shadowColor = "rgba(0,0,0,0.3)";
      ctx.shadowBlur = 3;
      ctx.shadowOffsetX = 2;
      ctx.shadowOffsetY = 2;
      for(let num=1; num<=12; num++){
        let ang = num * Math.PI/6;
        let x = 200 + Math.cos(ang - Math.PI/2) * 150;
        let y = 200 + Math.sin(ang - Math.PI/2) * 150;
        ctx.fillText(num.toString(), x, y);

        ctx.save();
        ctx.globalAlpha = 0.3;
        ctx.fillStyle = "white";
        ctx.font = "bold 30px Arial";
        ctx.fillText(num.toString(), x-1, y-1);
        ctx.restore();
      }
      ctx.shadowColor = "transparent";

      // merek jam
      ctx.font = "italic 18px Georgia";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillStyle = "black";
      ctx.fillText("Syakila Azzahra P", 200, 125);

      ctx.save();
      ctx.globalAlpha = 0.4;
      ctx.fillStyle = "white";
      ctx.fillText("Syakila Azzahra P", 199, 124);
      ctx.restore();

      // jarum jam
      let hrAng = hr * Math.PI/6;
      drawHand(hrAng, 95, 6, "black", true);

      // jarum menit
      let minAng = min * Math.PI/30;
      drawHand(minAng, 140, 4, "black", true);

      // jarum detik
      let secAng = sec * Math.PI/30;
      ctx.beginPath();
      ctx.lineWidth = 2;
      ctx.strokeStyle = "red";
      ctx.shadowColor = "rgba(255,0,0,0.6)";
      ctx.shadowBlur = 8;
      ctx.moveTo(200,200);
      ctx.lineTo(200 + 160*Math.cos(secAng - Math.PI/2),
                 200 + 160*Math.sin(secAng - Math.PI/2));
      ctx.stroke();

      // titik pusat
      ctx.beginPath();
      ctx.arc(200,200,7,0,2*Math.PI);
      ctx.fillStyle = "red";
      ctx.fill();

      ctx.shadowColor = "transparent";
      ctx.shadowBlur = 0;

      // jam digital + tanggal
      const days = ["Minggu","Senin","Selasa","Rabu","Kamis","Jumat","Sabtu"];
      const months = ["Januari","Februari","Maret","April","Mei","Juni","Juli","Agustus","September","Oktober","November","Desember"];
      let dayName = days[now.getDay()];
      let date = now.getDate();
      let monthName = months[now.getMonth()];
      let year = now.getFullYear();

      let digitalTime = `${Math.floor(hr).toString().padStart(2,'0')}:${Math.floor(min%60).toString().padStart(2,'0')}:${Math.floor(sec%60).toString().padStart(2,'0')}`;
      let fullDate = `${dayName}, ${date} ${monthName} ${year}`;

      digital.innerHTML = digitalTime;
      dateDiv.innerHTML = fullDate;

      requestAnimationFrame(drawClock);
    }

    function drawHand(angle, length, width, color, withShadow=false){
      ctx.beginPath();
      ctx.lineWidth = width;
      ctx.strokeStyle = color;
      if(withShadow){
        ctx.shadowColor = "rgba(0,0,0,0.4)";
        ctx.shadowBlur = 4;
        ctx.shadowOffsetX = 2;
        ctx.shadowOffsetY = 2;
      }
      ctx.moveTo(200,200);
      ctx.lineTo(200 + length*Math.cos(angle - Math.PI/2),
                 200 + length*Math.sin(angle - Math.PI/2));
      ctx.stroke();
      if(withShadow){
        ctx.shadowColor = "transparent";
        ctx.shadowBlur = 0;
      }
    }

    requestAnimationFrame(drawClock);

    // === Jadwal Sholat Hardcode + Highlight ===
    function loadPrayerTimes(){
      const prayerTimes = {
        Subuh: "04:49",
        Dzuhur: "12:10",
        Ashar: "15:12",
        Maghrib: "18:13",
        Isya: "19:22"
      };

      // waktu sekarang dalam menit
      let now = new Date();
      let currentMinutes = now.getHours()*60 + now.getMinutes();

      function toMinutes(time){
        let [h,m] = time.split(":").map(Number);
        return h*60 + m;
      }

      // cari waktu sholat berikutnya
      let nextPrayer = null;
      for(let [name,time] of Object.entries(prayerTimes)){
        if(toMinutes(time) > currentMinutes){
          nextPrayer = name;
          break;
        }
      }

      // tampilkan dengan highlight
      let html = "<h3>Waktu Sholat</h3>";
      for(let [name,time] of Object.entries(prayerTimes)){
        if(name === nextPrayer){
          html += `<span style="color:red;font-weight:bold">${name}: ${time}</span><br>`;
        } else {
          html += `${name}: ${time}<br>`;
        }
      }
      document.getElementById("prayer-times").innerHTML = html;
    }

    loadPrayerTimes();
  </script>
</body>
</html>
