<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Jam & Waktu Sholat - Syakila Azzahra P</title>
  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center;
      min-height: 100vh; font-family: 'Segoe UI', Roboto, sans-serif;
      background: #74ebd5; transition: background 1s ease-in-out; color: #333;
    }
    .clock-outer-container { width: 100%; max-width: 380px; padding: 10px; }
    .clock-wrapper { width: 100%; aspect-ratio: 1 / 1; position: relative; }
    canvas { width: 100%; height: 100%; display: block; background-color: #fff; border: 10px solid #2c3e50; border-radius: 50%; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
    .info-card { width: 100%; max-width: 380px; background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border-radius: 20px; padding: 20px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.1); margin-top: 10px; }
    #digital { font-size: 2.2rem; font-weight: 800; color: #2c3e50; margin: 0; font-variant-numeric: tabular-nums; }
    #date { font-size: 0.9rem; color: #5d6d7e; margin-top: 5px; }
    #location-coords { font-size: 0.75rem; color: #2980b9; margin-top: 10px; font-weight: 600; }
    hr { border: 0; border-top: 1px solid rgba(0,0,0,0.1); margin: 15px 0; }
    .prayer-container { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; font-size: 0.9rem; text-align: left; }
    .next-prayer { grid-column: span 2; background: #27ae60; color: white; padding: 15px; border-radius: 15px; font-weight: bold; margin-bottom: 5px; display: flex; flex-direction: column; align-items: center; gap: 4px; box-shadow: 0 4px 10px rgba(39, 174, 96, 0.3); }
    .countdown-text { font-size: 0.8rem; font-weight: normal; opacity: 0.9; }
    .prayer-row { display: flex; justify-content: space-between; padding: 10px 8px; background: rgba(0,0,0,0.03); border-radius: 8px; border-bottom: 2px solid rgba(0,0,0,0.05); }
    .prayer-row span:first-child { font-weight: 600; color: #555; }
    
    .btn-group { display: flex; gap: 10px; margin-bottom: 10px; width: 100%; max-width: 380px; }
    .action-btn {
      flex: 1; font-size: 0.75rem; padding: 12px; border-radius: 12px; border: none;
      font-weight: bold; cursor: pointer; transition: all 0.2s; box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }
    #audio-status { background: #f39c12; color: white; }
    #test-btn { background: #34495e; color: white; }
    .active-audio { background: #27ae60 !important; }
  </style>
</head>
<body>

  <div class="btn-group">
    <button id="audio-status" class="action-btn" onclick="enableAudio()">🔔 Aktifkan Adzan</button>
    <button id="test-btn" class="action-btn" onclick="testAdzan()">🔊 Tes Suara</button>
  </div>

  <div class="clock-outer-container">
    <div class="clock-wrapper">
      <canvas id="clock" width="800" height="800"></canvas>
    </div>
  </div>

  <div class="info-card">
    <p id="digital">00:00:00</p>
    <p id="date">Memuat Tanggal...</p>
    <p id="location-coords">Menunggu Izin Lokasi...</p>
    <hr>
    <div id="prayer-times" class="prayer-container">
      <div style="grid-column: span 2; text-align: center;">Mengambil Jadwal Sholat...</div>
    </div>
  </div>

  <audio id="adzan-audio" preload="auto">
    <source src="https://vocaroo.com/media/download_temp/V1be552zU4y8" type="audio/mpeg">
    <source src="https://www.islamcan.com/audio/adhan/azan2.mp3" type="audio/mpeg">
  </audio>

  <script>
    const canvas = document.getElementById("clock");
    const ctx = canvas.getContext("2d");
    const digital = document.getElementById("digital");
    const dateDiv = document.getElementById("date");
    const coordsDiv = document.getElementById("location-coords");
    const prayerDiv = document.getElementById("prayer-times");
    const audioStatus = document.getElementById("audio-status");
    const adzanAudio = document.getElementById("adzan-audio");
    
    let audioEnabled = false;
    let currentPrayerTimings = null;
    let lastPlayedMinute = ""; 

    function enableAudio() {
      adzanAudio.play().then(() => {
        adzanAudio.pause();
        adzanAudio.currentTime = 0;
        audioEnabled = true;
        audioStatus.innerHTML = "✅ Adzan Aktif";
        audioStatus.classList.add("active-audio");
        alert("Suara Adzan Berhasil Diaktifkan!");
      }).catch(e => alert("Klik tombol lagi untuk memberi izin suara."));
    }

    function testAdzan() {
      if(!audioEnabled) alert("Aktifkan Adzan dulu ya!");
      adzanAudio.currentTime = 0;
      adzanAudio.play();
      setTimeout(() => {
        if(confirm("Suara terdengar? Klik OK untuk hentikan tes.")) {
            adzanAudio.pause();
            adzanAudio.currentTime = 0;
        }
      }, 5000);
    }

    function updateDailyBackground() {
      const colors = ["#FF9A8B", "#a1c4fd", "#d4fc79", "#f093fb", "#84fab0", "#fccb90", "#e6e9f0"];
      document.body.style.background = `linear-gradient(135deg, ${colors[new Date().getDay()]} 0%, #ffffff 100%)`;
    }

    function drawClock() {
      const now = new Date();
      const ms = now.getMilliseconds();
      const sec = now.getSeconds();
      const min = now.getMinutes();
      const hr = now.getHours();

      if (audioEnabled && sec === 0) {
        checkAndPlayAdzan(hr, min);
      }

      ctx.clearRect(0, 0, 800, 800);
      const cx = 400, cy = 400, radius = 370;

      // Draw Marks
      for(let i=0; i<60; i++) {
        let ang = i * Math.PI/30;
        let isHour = i % 5 === 0;
        ctx.beginPath();
        ctx.lineWidth = isHour ? 12 : 4;
        ctx.strokeStyle = isHour ? "#2c3e50" : "#bdc3c7";
        ctx.moveTo(cx + Math.cos(ang) * (radius - 5), cy + Math.sin(ang) * (radius - 5));
        ctx.lineTo(cx + Math.cos(ang) * (radius - (isHour ? 35 : 15)), cy + Math.sin(ang) * (radius - (isHour ? 35 : 15)));
        ctx.stroke();
      }

      // Draw Numbers
      ctx.font = "bold 65px Arial";
      ctx.fillStyle = "#2c3e50";
      ctx.textAlign = "center"; ctx.textBaseline = "middle";
      for(let num=1; num<=12; num++) {
        let ang = (num * Math.PI/6) - Math.PI/2;
        ctx.fillText(num.toString(), cx + Math.cos(ang) * 280, cy + Math.sin(ang) * 280);
      }

      // Branding
      ctx.font = "bold italic 30px Georgia";
      ctx.fillStyle = "#2c3e50";
      ctx.fillText("Syakila Azzahra P", cx, cy - 110);

      // Hands
      drawHand(((hr + min/60) * Math.PI/6) - Math.PI/2, 220, 18, "#2c3e50");
      drawHand(((min + sec/60) * Math.PI/30) - Math.PI/2, 310, 10, "#34495e");
      drawHand(((sec + ms/1000) * Math.PI/30) - Math.PI/2, 340, 5, "#e74c3c");

      // Center Pin
      ctx.beginPath(); ctx.arc(cx, cy, 15, 0, 2*Math.PI); ctx.fillStyle = "#2c3e50"; ctx.fill();
      ctx.beginPath(); ctx.arc(cx, cy, 6, 0, 2*Math.PI); ctx.fillStyle = "#e74c3c"; ctx.fill();

      digital.innerText = now.toLocaleTimeString('id-ID', { hour12: false }).replace(/\./g, ':');
      dateDiv.innerText = now.toLocaleDateString('id-ID', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });

      if (currentPrayerTimings) displayPrayers(currentPrayerTimings);
      requestAnimationFrame(drawClock);
    }

    function drawHand(angle, length, width, color) {
      ctx.beginPath(); ctx.lineWidth = width; ctx.lineCap = "round"; ctx.strokeStyle = color;
      ctx.moveTo(400, 400);
      ctx.lineTo(400 + Math.cos(angle) * length, 400 + Math.sin(angle) * length);
      ctx.stroke();
    }

    function checkAndPlayAdzan(h, m) {
      if (!currentPrayerTimings || !audioEnabled) return;
      const timeNow = `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}`;
      
      const adj = 2; 
      const prayerTimes = [
        addMinutes(currentPrayerTimings.Fajr, adj),
        addMinutes(currentPrayerTimings.Dhuhr, adj),
        addMinutes(currentPrayerTimings.Asr, adj),
        addMinutes(currentPrayerTimings.Maghrib, adj),
        addMinutes(currentPrayerTimings.Isha, adj)
      ];

      if (prayerTimes.includes(timeNow) && lastPlayedMinute !== timeNow) {
        lastPlayedMinute = timeNow;
        adzanAudio.currentTime = 0;
        adzanAudio.play().catch(e => console.log("Gagal putar otomatis:", e));
      }
    }

    async function getPrayerData() {
      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(async (position) => {
          const lat = position.coords.latitude;
          const lng = position.coords.longitude;
          coordsDiv.innerText = `📍 Lokasi Terdeteksi (${lat.toFixed(2)}, ${lng.toFixed(2)})`;
          try {
            const url = `https://api.aladhan.com/v1/timings?latitude=${lat}&longitude=${lng}&method=20`;
            const response = await fetch(url);
            const data = await response.json();
            currentPrayerTimings = data.data.timings;
          } catch (err) { fetchDefaultJakarta(); }
        }, () => fetchDefaultJakarta());
      } else {
        fetchDefaultJakarta();
      }
    }

    async function fetchDefaultJakarta() {
      coordsDiv.innerText = "📍 Menggunakan Lokasi Default (Jakarta)";
      const res = await fetch(`https://api.aladhan.com/v1/timingsByCity?city=Jakarta&country=Indonesia&method=20`);
      const data = await res.json();
      currentPrayerTimings = data.data.timings;
    }

    function addMinutes(timeStr, minsToAdd) {
      let [h, m] = timeStr.split(':').map(Number);
      let date = new Date();
      date.setHours(h, m + minsToAdd, 0);
      return date.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit', hour12: false }).replace('.', ':');
    }

    function displayPrayers(timings) {
      const adj = 2; 
      const times = { Subuh: addMinutes(timings.Fajr, adj), Dzuhur: addMinutes(timings.Dhuhr, adj), Ashar: addMinutes(timings.Asr, adj), Maghrib: addMinutes(timings.Maghrib, adj), Isya: addMinutes(timings.Isha, adj) };
      const now = new Date();
      const currentTotalSec = now.getHours() * 3600 + now.getMinutes() * 60 + now.getSeconds();
      let nextHTML = ""; let listHTML = ""; let foundNext = false;

      for (let [name, time] of Object.entries(times)) {
        let [h, m] = time.split(":").map(Number);
        let prayerTotalSec = h * 3600 + m * 60;
        if (!foundNext && prayerTotalSec > currentTotalSec) {
          let diffSec = prayerTotalSec - currentTotalSec;
          let diffH = Math.floor(diffSec / 3600);
          let diffM = Math.floor((diffSec % 3600) / 60);
          nextHTML = `<div class="next-prayer"><span>Selanjutnya: ${name} (${time})</span><span class="countdown-text">${diffH > 0 ? diffH + 'j ' : ''}${diffM} menit lagi</span></div>`;
          foundNext = true;
        } else {
          listHTML += `<div class="prayer-row"><span>${name}</span> <span>${time}</span></div>`;
        }
      }
      if (!foundNext) nextHTML = `<div class="next-prayer">Menanti Waktu Subuh</div>`;
      prayerDiv.innerHTML = nextHTML + listHTML;
    }

    updateDailyBackground();
    getPrayerData();
    setInterval(getPrayerData, 1800000); 
    requestAnimationFrame(drawClock);
  </script>
</body>
</html>
