<!DOCTYPE html>
<html>
<head>
  <title>Jam Analog & Digital</title>
  <style>
    body {
      text-align: center;
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(135deg, #74ebd5, #ACB6E5);
      color: #333;
    }
    canvas {
      background: #fff;
      display: block;
      margin: 30px auto;
      border: 10px solid #000000;
      border-radius: 50%;
      box-shadow: 0 0 25px rgba(0,0,0,0.3);
    }
    #digital {
      font-size: 30px;
      font-weight: bold;
      margin-top: 12px;
    }
    #date {
      font-size: 20px;
      margin-top: 5px;
    }
  </style>
</head>
<body>
  <canvas id="clock" width="380" height="380"></canvas>
  <div id="digital"></div>
  <div id="date"></div>

  <script>
    const canvas = document.getElementById("clock");
    const ctx = canvas.getContext("2d");
    const digital = document.getElementById("digital");
    const dateDiv = document.getElementById("date");

    function drawClock(){
      const now = new Date();
      const ms = now.getMilliseconds();
      const sec = now.getSeconds() + ms/1000; // detik halus
      const min = now.getMinutes() + sec/60;
      const hr = now.getHours() + min/60;

      ctx.clearRect(0,0,380,380);

      // lingkaran jam
      ctx.beginPath();
      ctx.arc(190,190,170,0,2*Math.PI);
      ctx.strokeStyle = "black";
      ctx.stroke();

      // garis menit/jam
      for(let i=0; i<60; i++){
        let ang = i * Math.PI/30;
        let inner = (i % 5 === 0) ? 160 : 165;
        let outer = 170;
        let x1 = 190 + Math.cos(ang - Math.PI/2) * inner;
        let y1 = 190 + Math.sin(ang - Math.PI/2) * inner;
        let x2 = 190 + Math.cos(ang - Math.PI/2) * outer;
        let y2 = 190 + Math.sin(ang - Math.PI/2) * outer;
        ctx.beginPath();
        ctx.moveTo(x1,y1);
        ctx.lineTo(x2,y2);
        ctx.lineWidth = (i % 5 === 0) ? 2 : 1;
        ctx.strokeStyle = "black";
        ctx.stroke();
      }

      // angka jam
      ctx.font = "bold 28px Arial";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillStyle = "black";
      ctx.shadowColor = "rgba(0,0,0,0.3)";
      ctx.shadowBlur = 3;
      ctx.shadowOffsetX = 2;
      ctx.shadowOffsetY = 2;
      for(let num=1; num<=12; num++){
        let ang = num * Math.PI/6;
        let x = 190 + Math.cos(ang - Math.PI/2) * 145;
        let y = 190 + Math.sin(ang - Math.PI/2) * 145;
        ctx.fillText(num.toString(), x, y);
      }
      ctx.shadowColor = "transparent";

      // jarum jam
      let hrAng = hr * Math.PI/6;
      drawHand(hrAng, 90, 6, "black");

      // jarum menit
      let minAng = min * Math.PI/30;
      drawHand(minAng, 130, 4, "black");

      // jarum detik dengan glow halus
      let secAng = sec * Math.PI/30;
      ctx.beginPath();
      ctx.lineWidth = 2;
      ctx.strokeStyle = "red";
      ctx.shadowColor = "rgba(255,0,0,0.6)";
      ctx.shadowBlur = 8;
      ctx.shadowOffsetX = 0;
      ctx.shadowOffsetY = 0;
      ctx.moveTo(190,190);
      ctx.lineTo(190 + 150*Math.cos(secAng - Math.PI/2),
                 190 + 150*Math.sin(secAng - Math.PI/2));
      ctx.stroke();

      // titik pusat merah dengan glow
      ctx.beginPath();
      ctx.arc(190,190,6,0,2*Math.PI);
      ctx.fillStyle = "red";
      ctx.fill();

      // reset shadow
      ctx.shadowColor = "transparent";
      ctx.shadowBlur = 0;

      // jam digital + tanggal
      const days = ["Minggu","Senin","Selasa","Rabu","Kamis","Jumat","Sabtu"];
      const months = ["Januari","Februari","Maret","April","Mei","Juni","Juli","Agustus","September","Oktober","November","Desember"];
      let dayName = days[now.getDay()];
      let date = now.getDate();
      let monthName = months[now.getMonth()];
      let year = now.getFullYear();

      let digitalTime = `${Math.floor(hr).toString().padStart(2,'0')}:${Math.floor(min%60).toString().padStart(2,'0')}:${Math.floor(sec%60).toString().padStart(2,'0')}`;
      let fullDate = `${dayName}, ${date} ${monthName} ${year}`;

      digital.innerHTML = digitalTime;
      dateDiv.innerHTML = fullDate;

      requestAnimationFrame(drawClock); // animasi halus
    }

    function drawHand(angle, length, width, color){
      ctx.beginPath();
      ctx.lineWidth = width;
      ctx.strokeStyle = color;
      ctx.moveTo(190,190);
      ctx.lineTo(190 + length*Math.cos(angle - Math.PI/2),
                 190 + length*Math.sin(angle - Math.PI/2));
      ctx.stroke();
    }

    requestAnimationFrame(drawClock);
  </script>
</body>
</html>
