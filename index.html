<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Jam Syakila - KEMENAG RI</title>
  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    
    body {
      margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center;
      min-height: 100vh; font-family: 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #74ebd5 0%, #ACB6E5 100%); color: #333;
    }

    .clock-outer-container {
      width: 100%;
      max-width: 380px;
      padding: 10px;
    }

    .clock-wrapper {
      width: 100%;
      aspect-ratio: 1 / 1;
      position: relative;
    }

    canvas {
      width: 100%;
      height: 100%;
      display: block;
      background-color: #fff;
      border: 10px solid #2c3e50;
      border-radius: 50%;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    .info-card {
      width: 100%;
      max-width: 380px;
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 20px;
      text-align: center;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      margin-top: 10px;
    }

    #digital { font-size: 2.2rem; font-weight: 800; color: #2c3e50; margin: 0; font-variant-numeric: tabular-nums; }
    #date { font-size: 0.9rem; color: #5d6d7e; margin-top: 5px; }

    /* WARNA BARU: Biru Elegan untuk Status GPS */
    #location-coords { 
      font-size: 0.8rem; 
      color: #2980b9; /* Biru elegan (Steel Blue) */
      margin-top: 10px; 
      font-weight: 600; 
      letter-spacing: 0.3px;
    }

    hr { border: 0; border-top: 1px solid rgba(0,0,0,0.1); margin: 15px 0; }
    .prayer-container { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; font-size: 0.9rem; }
    .next-prayer { grid-column: span 2; background: #e74c3c; color: white; padding: 8px; border-radius: 10px; font-weight: bold; margin-bottom: 5px; }
    .prayer-row { display: flex; justify-content: space-between; padding: 4px 10px; border-bottom: 1px solid rgba(0,0,0,0.05); }
  </style>
</head>
<body>

  <div class="clock-outer-container">
    <div class="clock-wrapper">
      <canvas id="clock" width="800" height="800"></canvas>
    </div>
  </div>

  <div class="info-card">
    <p id="digital">00:00:00</p>
    <p id="date">Memuat Tanggal...</p>
    <p id="location-coords">Sinkronisasi GPS...</p>
    <hr>
    <div id="prayer-times" class="prayer-container">
      <div style="grid-column: span 2;">Sinkronisasi KEMENAG...</div>
    </div>
  </div>

  <script>
    const canvas = document.getElementById("clock");
    const ctx = canvas.getContext("2d");
    const digital = document.getElementById("digital");
    const dateDiv = document.getElementById("date");
    const coordsDiv = document.getElementById("location-coords");
    const prayerDiv = document.getElementById("prayer-times");

    function drawClock() {
      const now = new Date();
      const ms = now.getMilliseconds();
      const sec = now.getSeconds() + ms/1000;
      const min = now.getMinutes() + sec/60;
      const hr = now.getHours() + min/60;

      ctx.clearRect(0, 0, 800, 800);
      const cx = 400, cy = 400, radius = 370;

      for(let i=0; i<60; i++) {
        let ang = i * Math.PI/30;
        let isHour = i % 5 === 0;
        ctx.beginPath();
        ctx.lineWidth = isHour ? 12 : 4;
        ctx.strokeStyle = isHour ? "#2c3e50" : "#bdc3c7";
        ctx.moveTo(cx + Math.cos(ang) * (radius - 5), cy + Math.sin(ang) * (radius - 5));
        ctx.lineTo(cx + Math.cos(ang) * (radius - (isHour ? 35 : 15)), cy + Math.sin(ang) * (radius - (isHour ? 35 : 15)));
        ctx.stroke();
      }

      ctx.font = "bold 65px Arial";
      ctx.fillStyle = "#2c3e50";
      ctx.textAlign = "center"; ctx.textBaseline = "middle";
      for(let num=1; num<=12; num++) {
        let ang = (num * Math.PI/6) - Math.PI/2;
        ctx.fillText(num.toString(), cx + Math.cos(ang) * 280, cy + Math.sin(ang) * 280);
      }

      ctx.font = "bold italic 30px Georgia";
      ctx.fillStyle = "#2c3e50";
      ctx.fillText("Syakila Azzahra P", cx, cy + 110);

      drawHand((hr * Math.PI/6) - Math.PI/2, 220, 18, "#2c3e50");
      drawHand((min * Math.PI/30) - Math.PI/2, 310, 10, "#34495e");
      drawHand((sec * Math.PI/30) - Math.PI/2, 340, 5, "#e74c3c");

      ctx.beginPath(); ctx.arc(cx, cy, 15, 0, 2*Math.PI); ctx.fillStyle = "#2c3e50"; ctx.fill();
      ctx.beginPath(); ctx.arc(cx, cy, 6, 0, 2*Math.PI); ctx.fillStyle = "#e74c3c"; ctx.fill();

      digital.innerText = now.toLocaleTimeString('id-ID', { hour12: false }).replace(/\./g, ':');
      dateDiv.innerText = now.toLocaleDateString('id-ID', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });

      requestAnimationFrame(drawClock);
    }

    function drawHand(angle, length, width, color) {
      ctx.beginPath(); ctx.lineWidth = width; ctx.lineCap = "round"; ctx.strokeStyle = color;
      ctx.moveTo(400, 400);
      ctx.lineTo(400 + Math.cos(angle) * length, 400 + Math.sin(angle) * length);
      ctx.stroke();
    }

    async function getPrayerData() {
      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(async (position) => {
          const lat = position.coords.latitude;
          const lng = position.coords.longitude;
          // Tampilan teks diperbarui agar lebih elegan
          coordsDiv.innerText = `Terhubung ke KEMENAG RI (${lat.toFixed(2)}, ${lng.toFixed(2)})`;

          try {
            const url = `https://api.aladhan.com/v1/timings?latitude=${lat}&longitude=${lng}&method=99&methodSettings=20,null,18`;
            const response = await fetch(url);
            const data = await response.json();
            displayPrayers(data.data.timings);
          } catch (err) {
            prayerDiv.innerHTML = "Gagal memuat jadwal.";
          }
        }, () => {
          coordsDiv.innerText = "GPS Tidak Aktif";
          fetchDefaultJakarta();
        });
      }
    }

    async function fetchDefaultJakarta() {
      const res = await fetch(`https://api.aladhan.com/v1/timingsByCity?city=Jakarta&country=Indonesia&method=20`);
      const data = await res.json();
      displayPrayers(data.data.timings);
    }

    function addMinutes(timeStr, minsToAdd) {
      let [h, m] = timeStr.split(':').map(Number);
      let date = new Date();
      date.setHours(h, m + minsToAdd, 0);
      return date.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit', hour12: false }).replace('.', ':');
    }

    function displayPrayers(timings) {
      const adj = 2; 
      const times = { 
        Subuh: addMinutes(timings.Fajr, adj), 
        Dzuhur: addMinutes(timings.Dhuhr, adj), 
        Ashar: addMinutes(timings.Asr, adj), 
        Maghrib: addMinutes(timings.Maghrib, adj), 
        Isya: addMinutes(timings.Isha, adj) 
      };

      const now = new Date();
      const currentMin = now.getHours() * 60 + now.getMinutes();
      let html = "";
      let foundNext = false;

      for (let [name, time] of Object.entries(times)) {
        let [h, m] = time.split(":").map(Number);
        let pMin = h * 60 + m;

        if (!foundNext && pMin > currentMin) {
          html += `<div class="next-prayer">Selanjutnya: ${name} (${time})</div>`;
          foundNext = true;
        } else {
          html += `<div class="prayer-row"><span>${name}</span> <span>${time}</span></div>`;
        }
      }
      prayerDiv.innerHTML = html;
    }

    getPrayerData();
    setInterval(getPrayerData, 1800000); 
    requestAnimationFrame(drawClock);
  </script>
</body>
</html>
