<!DOCTYPE html>
<html>
<head>
  <title>Jam Analog & Digital</title>
  <style>
    body {
      text-align: center;
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(135deg, #74ebd5, #ACB6E5);
      color: #333;
    }
    canvas {
      background: #fff;
      display: block;
      margin: 30px auto;
      border: 8px solid #000000; /* border hitam */
      border-radius: 50%;
      box-shadow: 0 0 20px rgba(0,0,0,0.3);
    }
    #digital {
      font-size: 24px;
      margin-top: 10px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <canvas id="clock" width="300" height="300"></canvas>
  <div id="digital"></div>

  <script>
    const canvas = document.getElementById("clock");
    const ctx = canvas.getContext("2d");
    const digital = document.getElementById("digital");

    function drawClock(){
      const now = new Date();
      const sec = now.getSeconds();
      const min = now.getMinutes();
      const hr = now.getHours();

      ctx.clearRect(0,0,300,300);

      // lingkaran jam
      ctx.beginPath();
      ctx.arc(150,150,140,0,2*Math.PI);
      ctx.stroke();

      // garis menit/jam (tick marks) rata dengan lingkaran luar
      for(let i=0; i<60; i++){
        let ang = i * Math.PI/30;
        let inner = (i % 5 === 0) ? 130 : 135;
        let outer = 140;
        let x1 = 150 + Math.cos(ang - Math.PI/2) * inner;
        let y1 = 150 + Math.sin(ang - Math.PI/2) * inner;
        let x2 = 150 + Math.cos(ang - Math.PI/2) * outer;
        let y2 = 150 + Math.sin(ang - Math.PI/2) * outer;
        ctx.beginPath();
        ctx.moveTo(x1,y1);
        ctx.lineTo(x2,y2);
        ctx.lineWidth = (i % 5 === 0) ? 2 : 1;
        ctx.strokeStyle = "black";
        ctx.stroke();
      }

      // angka 1-12 lebih besar + bayangan tipis
      ctx.font = "22px Arial";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillStyle = "black";
      ctx.shadowColor = "rgba(0,0,0,0.3)";
      ctx.shadowBlur = 3;
      ctx.shadowOffsetX = 2;
      ctx.shadowOffsetY = 2;
      for(let num=1; num<=12; num++){
        let ang = num * Math.PI/6;
        let x = 150 + Math.cos(ang - Math.PI/2) * 100;
        let y = 150 + Math.sin(ang - Math.PI/2) * 100;
        ctx.fillText(num.toString(), x, y);
      }
      // reset shadow agar tidak mempengaruhi jarum
      ctx.shadowColor = "transparent";

      // jarum jam
      let hrAng = ((hr%12) + min/60) * Math.PI/6;
      drawHand(hrAng, 70, 6, "black");

      // jarum menit
      let minAng = (min + sec/60) * Math.PI/30;
      drawHand(minAng, 100, 4, "black");

      // jarum detik
      let secAng = sec * Math.PI/30;
      drawHand(secAng, 110, 2, "red");

      // lingkaran pusat jarum
      ctx.beginPath();
      ctx.arc(150,150,5,0,2*Math.PI);
      ctx.fillStyle = "black";
      ctx.fill();

      // jam digital + hari + tanggal
      const days = ["Minggu","Senin","Selasa","Rabu","Kamis","Jumat","Sabtu"];
      const months = ["Januari","Februari","Maret","April","Mei","Juni","Juli","Agustus","September","Oktober","November","Desember"];
      let dayName = days[now.getDay()];
      let date = now.getDate();
      let monthName = months[now.getMonth()];
      let year = now.getFullYear();

      let digitalTime = `${hr.toString().padStart(2,'0')}:${min.toString().padStart(2,'0')}:${sec.toString().padStart(2,'0')}`;
      let fullDate = `${dayName}, ${date} ${monthName} ${year}`;

      digital.innerHTML = digitalTime + "<br>" + fullDate;
    }

    function drawHand(angle, length, width, color){
      ctx.beginPath();
      ctx.lineWidth = width;
      ctx.strokeStyle = color;
      ctx.moveTo(150,150);
      ctx.lineTo(150 + length*Math.cos(angle - Math.PI/2),
                 150 + length*Math.sin(angle - Math.PI/2));
      ctx.stroke();
    }

    setInterval(drawClock,1000);
  </script>
</body>
</html>
