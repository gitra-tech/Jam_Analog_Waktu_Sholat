<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jam Analog & Digital Responsive</title>
  <style>
    body {
      margin: 0;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: linear-gradient(135deg, #74ebd5, #ACB6E5);
      color: #333;
    }

    /* Container untuk menjaga proporsi */
    .clock-container {
      position: relative;
      width: 100%;
      max-width: 400px; /* Ukuran maksimal di desktop */
      aspect-ratio: 1 / 1;
    }

    canvas {
      width: 100%;
      height: 100%;
      display: block;
      border: 8px solid #222;
      border-radius: 50%;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
      background-color: #fff;
    }

    #info-panel {
      background: rgba(255, 255, 255, 0.8);
      padding: 20px;
      border-radius: 15px;
      margin-top: 20px;
      width: 90%;
      max-width: 360px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }

    #digital {
      font-size: clamp(1.5rem, 5vw, 2rem);
      font-weight: bold;
      letter-spacing: 2px;
    }

    #date {
      font-size: 1rem;
      margin-bottom: 15px;
      color: #555;
    }

    .prayer-list {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      text-align: left;
      font-size: 0.95rem;
    }

    .highlight {
      color: #e74c3c;
      font-weight: bold;
      grid-column: span 2;
      text-align: center;
      background: rgba(231, 76, 60, 0.1);
      padding: 5px;
      border-radius: 5px;
    }
  </style>
</head>
<body>

  <div class="clock-container">
    <canvas id="clock" width="800" height="800"></canvas>
  </div>

  <div id="info-panel">
    <div id="digital">00:00:00</div>
    <div id="date">Memuat Tanggal...</div>
    <hr style="border: 0; border-top: 1px solid #ccc;">
    <h4 style="margin: 10px 0;">Jadwal Sholat</h4>
    <div id="prayer-times" class="prayer-list"></div>
  </div>

  <script>
    const canvas = document.getElementById("clock");
    const ctx = canvas.getContext("2d");
    const digital = document.getElementById("digital");
    const dateDiv = document.getElementById("date");
    const prayerDiv = document.getElementById("prayer-times");

    function drawClock() {
      const now = new Date();
      const ms = now.getMilliseconds();
      const sec = now.getSeconds() + ms/1000;
      const min = now.getMinutes() + sec/60;
      const hr = now.getHours() + min/60;

      // Reset canvas
      ctx.clearRect(0,0,800,800);
      
      // Center point
      const cx = 400;
      const cy = 400;
      const radius = 360;

      // Background
      ctx.beginPath();
      ctx.arc(cx, cy, radius, 0, 2*Math.PI);
      ctx.fillStyle = "#fff";
      ctx.fill();

      // Penanda Menit & Jam
      for(let i=0; i<60; i++){
        let ang = i * Math.PI/30;
        let isHour = i % 5 === 0;
        let len = isHour ? 40 : 20;
        ctx.beginPath();
        ctx.lineWidth = isHour ? 6 : 3;
        ctx.strokeStyle = isHour ? "#000" : "#bbb";
        ctx.moveTo(cx + Math.cos(ang) * (radius), cy + Math.sin(ang) * (radius));
        ctx.lineTo(cx + Math.cos(ang) * (radius - len), cy + Math.sin(ang) * (radius - len));
        ctx.stroke();
      }

      // Angka
      ctx.font = "bold 50px Arial";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillStyle = "#222";
      for(let num=1; num<=12; num++){
        let ang = num * Math.PI/6 - Math.PI/2;
        ctx.fillText(num.toString(), cx + Math.cos(ang) * 280, cy + Math.sin(ang) * 280);
      }

      // Nama/Merek
      ctx.font = "24px Georgia";
      ctx.fillText("Syakila Azzahra P", cx, cy - 100);

      // Jarum Jam
      drawHand((hr * Math.PI/6) - Math.PI/2, 200, 14, "#222");
      // Jarum Menit
      drawHand((min * Math.PI/30) - Math.PI/2, 300, 8, "#444");
      // Jarum Detik
      drawHand((sec * Math.PI/30) - Math.PI/2, 330, 4, "#e74c3c");

      // Titik Tengah
      ctx.beginPath();
      ctx.arc(cx, cy, 12, 0, 2*Math.PI);
      ctx.fillStyle = "#e74c3c";
      ctx.fill();

      // Update Digital
      const digitalTime = now.toLocaleTimeString('id-ID', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
      const fullDate = now.toLocaleDateString('id-ID', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
      
      digital.innerHTML = digitalTime.replace(/\./g, ':');
      dateDiv.innerHTML = fullDate;

      requestAnimationFrame(drawClock);
    }

    function drawHand(angle, length, width, color) {
      ctx.beginPath();
      ctx.lineWidth = width;
      ctx.lineCap = "round";
      ctx.strokeStyle = color;
      ctx.moveTo(400, 400);
      ctx.lineTo(400 + Math.cos(angle) * length, 400 + Math.sin(angle) * length);
      ctx.stroke();
    }

    function updatePrayerTimes(){
      const prayerTimes = { Subuh: "04:49", Dzuhur: "12:10", Ashar: "15:12", Maghrib: "18:13", Isya: "19:22" };
      const now = new Date();
      const current = now.getHours() * 60 + now.getMinutes();
      
      let html = "";
      let foundNext = false;

      for(let [name, time] of Object.entries(prayerTimes)){
        let [h, m] = time.split(":").map(Number);
        let prayerMinutes = h * 60 + m;

        if(!foundNext && prayerMinutes > current) {
          html += `<div class="highlight">Selanjutnya: ${name} (${time})</div>`;
          foundNext = true;
        } else {
          html += `<div>${name}</div><div>${time}</div>`;
        }
      }
      prayerDiv.innerHTML = html;
    }

    setInterval(updatePrayerTimes, 60000); // Update tiap menit
    updatePrayerTimes();
    requestAnimationFrame(drawClock);
  </script>
</body>
</html>
